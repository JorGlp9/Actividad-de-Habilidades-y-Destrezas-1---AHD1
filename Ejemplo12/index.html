<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHD1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div>
            <h1>PLANIFICADO DE VIAJE</h1>
        </div>
        <div>
            <label for="">Nombre del viajero:</label>
            <input type="text" id="inputNombre">
        </div>
        <div>
            <label for="">Destinos</label>
            <select name="" id="selectDestino">
                <option value="playa">Playa</option>
                <option value="Volcan">Volcan</option>
                <option value="Ciudad">Ciudad</option>
            </select>
        </div>
        <div>
            <label for="">Dias de viaje:</label>
            <input type="number" id="inputDias">
        </div>
        <div>
            <label for="">Fecha de salida:</label>
            <input type="date" id="inputFecha">
        </div>
        <div>
            <button id="btnCalcular">Calcular viaje</button>
        </div>
        <div>
            <div id="divResultado"></div>
        </div>
    </section>

    <script src="js/script.js"></script>

</body>
</html>
